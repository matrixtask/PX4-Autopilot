module_name: vtol_att_control
parameters:
- group: VTOL Attitude Control
  definitions:
    VT_FWD_THRUST_EN:
      description:
        short: Use fixed-wing actuation in hover to accelerate forward
        long: |-
          Prevents downforce from pitching the body down when facing wind.
          Uses puller/pusher (standard VTOL), or forward-tilt (tiltrotor VTOL) to accelerate forward instead.
          Only active if demanded pitch  is below VT_PITCH_MIN.
          Use VT_FWD_THRUST_SC to tune it.
          Descend mode is treated as Landing too.

          Only active (if enabled) in height-rate controlled modes.
      type: enum
      values:
        0: Disabled
        1: Enabled (except LANDING)
        2: Enabled if above MPC_LAND_ALT1
        3: Enabled if above MPC_LAND_ALT2
        4: Enabled constantly
        5: Enabled if above MPC_LAND_ALT1 (except LANDING)
        6: Enabled if above MPC_LAND_ALT2 (except LANDING)
      default: 0
    VT_FWD_THRUST_SC:
      description:
        short: Fixed-wing actuation thrust scale in hover
        long: |-
          Scale applied to the demanded pitch (below VT_PITCH_MIN) to get the fixed-wing forward actuation in hover mode.
          Enabled via VT_FWD_THRUST_EN.
      type: float
      default: 0.7
      min: 0.0
      max: 5.0
      increment: 0.01
      decimal: 2
    VT_B_TRANS_RAMP:
      description:
        short: Back transition MC motor ramp up time
        long: This sets the duration during which the MC motors ramp up to the commanded
          thrust during the back transition stage.
      type: float
      default: 3.0
      unit: s
      min: 0.0
      max: 20.0
      increment: 0.1
      decimal: 1
    VT_B_RAMP_MIN:
      description:
        short: Back transition MC motor ramp START weight (overlap floor)
        long: At the start of the back transition the MC motor (mc_weight) ramp begins from
          this floor instead of 0, so the lift rotors provide partial thrust IMMEDIATELY and
          overlap with the still-flying wing -> removes the zero-thrust spin-up free-fall dip.
          0 = stock behaviour (ramp from 0).
      type: float
      default: 0.0
      min: 0.0
      max: 0.9
      increment: 0.05
      decimal: 2
    VT_LIFT_HND_V:
      description:
        short: Airspeed-scheduled wing->rotor lift-handoff speed [m/s]
        long: |-
          During a VTOL transition, floor the MC motor weight on an AIRSPEED SCHEDULE:
          floor = max(0, 1 - (CAS/VT_LIFT_HND_V)^2). VT_LIFT_HND_V is the airspeed at which
          the WING ALONE carries the full weight (lift = W at the trim CL). So at/above this
          speed the rotors are ~0 (wing carries all -> normal FW transition untouched), and
          as speed bleeds the rotors smoothly take over EXACTLY the lift the wing is losing
          (wing+rotor ~= weight, continuous handoff) -> no abrupt unload, no free-fall dip,
          minimal extra power. 0 = disabled (use the flat VT_B_RAMP_MIN instead).
      type: float
      default: 0.0
      min: 0.0
      max: 80.0
      increment: 1.0
      decimal: 1
    VT_LIFT_HND_THR:
      description:
        short: Lift-rotor collective at the FW handoff (hover-thrust scale) [-]
        long: |-
          Peak lift-rotor collective commanded in FW_MODE during the forward-transition
          climb-out to bridge the MC->FW lift-handoff valley. In FW the MC thrust setpoint is
          ~0 (wing+pusher fly), so the stock 2 s fade has nothing to scale and the rotors cut
          to zero the instant the transition completes (~CAS 54) while the wing only makes full
          lift at VT_LIFT_HND_V (~72). This commands an ABSOLUTE up-thrust = VT_LIFT_HND_THR *
          (1 - (CAS/VT_LIFT_HND_V)^2) so the rotors carry the wing's lift deficit and release
          smoothly as CAS -> VT_LIFT_HND_V. Active ONLY while CAS < VT_LIFT_HND_V and within
          ~25 s of FW entry (never re-engages in cruise / P8 brake / P9 descent). Set to the
          airframe hover collective (~0.6); lower to trade a deeper valley for less rotor drag/
          energy, raise for a shallower valley. 0 = disabled (stock instant cut).
      type: float
      default: 0.0
      min: 0.0
      max: 1.0
      increment: 0.05
      decimal: 2
    VT_PSHER_SLEW:
      description:
        short: Pusher throttle ramp up slew rate
        long: |-
          Defines the slew rate of the puller/pusher throttle during transitions.
          Zero will deactivate the slew rate limiting and thus produce an instant throttle
          rise to the transition throttle VT_F_TRANS_THR.
      type: float
      default: 0.33
      unit: 1/s
      min: 0
      increment: 0.01
      decimal: 2
    VT_FW_MC_THR:
      description:
        short: Lift-rotor collective in FW mode for a rotor-borne steep climb [0..1]
        long: |-
          When > 0, command ALL lift rotors at this uniform collective thrust while in FW_MODE
          (symmetric -> pure upward body force, no moment; the FW surfaces keep attitude). Lets
          the rotors carry weight / add climb force so the vehicle can climb steeper than the
          forward-thrust-limited pusher allows alone (the design 1/4 climb is intrinsically a
          low-speed rotor-borne climb). Set by the mission during the climb phase, 0 at cruise.
          0 = stock FW (rotors idle/faded). This is the Mk-7 rotor-assisted climb lever.
      type: float
      default: 0.0
      min: 0.0
      max: 0.9
      increment: 0.02
      decimal: 2
